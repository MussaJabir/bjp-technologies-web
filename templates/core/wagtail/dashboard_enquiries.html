{% load i18n %}
<div class="bjp-enquiries-panel">
    <h2 class="bjp-enquiries-panel__title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00C6FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
        </svg>
        Contact Enquiries
    </h2>

    <div class="bjp-enquiries-panel__stats">
        <div class="bjp-stat">
            <div class="bjp-stat__count bjp-stat__count--new">{{ new_count }}</div>
            <div class="bjp-stat__label">New</div>
        </div>
        <div class="bjp-stat">
            <div class="bjp-stat__count">{{ read_count }}</div>
            <div class="bjp-stat__label">Read</div>
        </div>
        <div class="bjp-stat">
            <div class="bjp-stat__count">{{ replied_count }}</div>
            <div class="bjp-stat__label">Replied</div>
        </div>
    </div>

    {% if recent %}
        <ul class="bjp-enquiries-panel__list">
            {% for enquiry in recent %}
            <li>
                <div>
                    <div class="bjp-enquiry-name">{{ enquiry.full_name }}</div>
                    <div class="bjp-enquiry-email">{{ enquiry.email }}</div>
                </div>
                <span class="bjp-badge bjp-badge--{{ enquiry.status }}">{{ enquiry.status }}</span>
            </li>
            {% endfor %}
        </ul>
    {% else %}
        <p class="bjp-enquiries-panel__empty">No enquiries yet.</p>
    {% endif %}
</div>
